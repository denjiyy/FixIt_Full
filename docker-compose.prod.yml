services:
  mongodb:
    restart: always
    environment:
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:?MONGODB_ROOT_PASSWORD is required}

  fixit-app:
    restart: always
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI is required}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-fixit-prod}

      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME is required}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY is required}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET is required}

      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}

      OpenAI__ApiKey: ${OPENAI_API_KEY:-}

      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      AllowedHosts: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      Security__CorsAllowedOrigins: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      Security__TrustedProxyIps: ${SECURITY_TRUSTED_PROXY_IPS:-}
      Security__HttpsPort: ${SECURITY_HTTPS_PORT:-443}

      Email__Provider: ${EMAIL_PROVIDER:?EMAIL_PROVIDER is required}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:?EMAIL_FROM_ADDRESS is required}
      Email__FromName: ${EMAIL_FROM_NAME:-FixIt}
      Email__Smtp__Host: ${SMTP_HOST:-}
      Email__Smtp__Port: ${SMTP_PORT:-587}
      Email__Smtp__Username: ${SMTP_USERNAME:-}
      Email__Smtp__Password: ${SMTP_PASSWORD:-}
      Email__Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}

      DataProtection__KeyRingPath: ${DATA_PROTECTION_KEY_RING_PATH:-/app/data-protection-keys}
      DataProtection__CertificatePath: ${DATA_PROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${DATA_PROTECTION_CERTIFICATE_PASSWORD:-}
      Database__ResetOnStartup: "false"
      Database__EnableDevelopmentAdminSeed: "false"
      DetailedErrors: "false"

      LOGGING__LOGLEVEL__DEFAULT: Warning
      LOGGING__LOGLEVEL__MICROSOFT: Warning
      LOGGING__LOGLEVEL__MICROSOFT_ASPNETCORE: Warning

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
        reservations:
          cpus: "1"
          memory: 512M
