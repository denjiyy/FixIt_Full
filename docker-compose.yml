services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me-local-db-password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE_NAME:-fixit}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fixit-network

  fixit-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}

      MONGODB_URI: ${MONGODB_URI:-mongodb://root:${MONGODB_ROOT_PASSWORD:-change-me-local-db-password}@mongodb:27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-fixit}

      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}

      OpenAI__ApiKey: ${OPENAI_API_KEY:-}

      Jwt__SecretKey: ${JWT_SECRET_KEY:-change-me-local-jwt-secret-key-at-least-32-chars}
      AllowedHosts: ${ALLOWED_HOSTS:-localhost;127.0.0.1}
      Security__CorsAllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost:5092,http://localhost:3000}
      Security__TrustedProxyIps: ${SECURITY_TRUSTED_PROXY_IPS:-}
      Security__HttpsPort: ${SECURITY_HTTPS_PORT:-443}

      Email__Provider: ${EMAIL_PROVIDER:-Console}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-noreply@fixit.local}
      Email__FromName: ${EMAIL_FROM_NAME:-FixIt}
      Email__Smtp__Host: ${SMTP_HOST:-localhost}
      Email__Smtp__Port: ${SMTP_PORT:-587}
      Email__Smtp__Username: ${SMTP_USERNAME:-}
      Email__Smtp__Password: ${SMTP_PASSWORD:-}
      Email__Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}

      DataProtection__KeyRingPath: ${DATA_PROTECTION_KEY_RING_PATH:-/app/data-protection-keys}
      DataProtection__CertificatePath: ${DATA_PROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${DATA_PROTECTION_CERTIFICATE_PASSWORD:-}
      Database__ResetOnStartup: ${DATABASE_RESET_ON_STARTUP:-false}
      Database__EnableDevelopmentAdminSeed: ${DATABASE_ENABLE_DEVELOPMENT_ADMIN_SEED:-false}
      Database__DevelopmentAdmin__UserName: ${DATABASE_DEVELOPMENT_ADMIN_USERNAME:-admin}
      Database__DevelopmentAdmin__Email: ${DATABASE_DEVELOPMENT_ADMIN_EMAIL:-admin@fixit.local}
      Database__DevelopmentAdmin__Password: ${DATABASE_DEVELOPMENT_ADMIN_PASSWORD:-}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - fixit_uploads:/app/wwwroot/uploads
      - fixit_dataprotection:/app/data-protection-keys
    healthcheck:
      test: curl -f http://localhost:8080/health/live || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fixit-network

volumes:
  mongodb_data:
  mongodb_config:
  fixit_uploads:
  fixit_dataprotection:

networks:
  fixit-network:
    driver: bridge
