name: .NET Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '9.0.x'

# Build backend projects explicitly. The Mobile project (FixIt.Mobile) targets
# net9.0-ios / net9.0-android and requires SDKs not present on ubuntu-latest, so
# we don't build the full solution here. Adding mobile CI is a separate concern.
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: false

    - name: Restore backend dependencies
      run: |
        dotnet restore FixIt/FixIt.csproj
        dotnet restore FixIt.Tests/FixIt.Tests.csproj

    - name: Build backend
      run: |
        dotnet build FixIt/FixIt.csproj -c Release --no-restore
        dotnet build FixIt.Tests/FixIt.Tests.csproj -c Release --no-restore

    - name: Run tests with coverage
      run: |
        dotnet test FixIt.Tests/FixIt.Tests.csproj \
          -c Release --no-build \
          --logger "console;verbosity=minimal" \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./test-results \
          --collect:"XPlat Code Coverage" \
          -- RunConfiguration.DisableAppDomain=true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: ./test-results
        files: '**/coverage.cobertura.xml'
        # Codecov status checks (defined in codecov.yml) gate the PR on coverage,
        # not this step. Keep this step soft so a Codecov outage doesn't block CI.
        fail_ci_if_error: false
        verbose: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./test-results
        retention-days: 14

    - name: Check for NuGet vulnerabilities (including transitive)
      run: |
        dotnet list FixIt/FixIt.csproj package --vulnerable --include-transitive
        dotnet list FixIt.Tests/FixIt.Tests.csproj package --vulnerable --include-transitive

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: fixit:latest
        load: true
